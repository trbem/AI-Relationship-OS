name: Windows build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and smoke-test Windows artifacts
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      CI: "true"
      FLUTTER_SUPPRESS_ANALYTICS: "true"
      LLM_API_KEY: ""
      LLM_BASE_URL: ""
      LLM_FALLBACK_ENABLED: "false"
      OLLAMA_BASE_URL: http://127.0.0.1:9
      OLLAMA_TIMEOUT_SECONDS: "0.05"
      REDIS_URL: redis://127.0.0.1:9/0
      S3_ENDPOINT_URL: http://127.0.0.1:9
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-build.txt

      - name: Set up Flutter 3.44.1
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Install backend build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes --requirement backend/requirements-build.txt
          python -m pip check

      - name: Resolve locked Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Build PyInstaller backend
        shell: pwsh
        run: |
          $python = (Get-Command python -ErrorAction Stop).Source
          & .\scripts\Build-Backend.ps1 -Python $python

      - name: Build release, ZIP, Setup, and SHA256
        shell: pwsh
        run: |
          $python = (Get-Command python -ErrorAction Stop).Source
          $git = (Get-Command git -ErrorAction Stop).Source
          $flutter = (Get-Command flutter -ErrorAction Stop).Source
          $flutterRoot = Split-Path -Parent (Split-Path -Parent $flutter)
          $innoSetup = @(
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if (-not $innoSetup) {
            throw "Inno Setup 6 is not installed on this runner."
          }

          $pubspec = Get-Content -LiteralPath .\frontend\pubspec.yaml
          $versionLine = $pubspec | Where-Object { $_ -match '^version:\s*' } | Select-Object -First 1
          if ($versionLine -notmatch '^version:\s*([0-9]+\.[0-9]+\.[0-9]+)') {
            throw "Unable to read the release version from frontend/pubspec.yaml."
          }
          $version = $Matches[1]
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          & .\scripts\Release-Windows.ps1 `
            -Version $version `
            -FlutterRoot $flutterRoot `
            -Git $git `
            -Python $python `
            -InnoSetup $innoSetup `
            -SkipBackendBuild `
            -SkipFlutterTests

      - name: Start packaged backend and verify health and database initialization
        shell: pwsh
        run: |
          $package = Join-Path $PWD "dist\RelationshipOS-Windows-x64-$env:RELEASE_VERSION"
          $backend = Join-Path $package "backend\relationship_os_backend.exe"
          $dataDir = Join-Path $env:RUNNER_TEMP "relationship-os-smoke-data"
          $env:RELATIONSHIP_OS_DATA_DIR = $dataDir
          $process = Start-Process -FilePath $backend -WorkingDirectory (Split-Path -Parent $backend) -PassThru -WindowStyle Hidden
          try {
            $deadline = (Get-Date).AddSeconds(60)
            do {
              if ($process.HasExited) {
                throw "Packaged backend exited early with code $($process.ExitCode)."
              }
              try {
                $health = Invoke-RestMethod -Uri "http://127.0.0.1:8000/health" -TimeoutSec 2
                break
              } catch {
                Start-Sleep -Milliseconds 500
              }
            } while ((Get-Date) -lt $deadline)

            if (-not $health -or $health.status -ne "ok") {
              throw "Packaged backend did not become healthy within 60 seconds."
            }
            $status = Invoke-RestMethod -Uri "http://127.0.0.1:8000/api/system/status" -TimeoutSec 10
            if ($status.status -ne "ok" -or -not $status.initialized -or $status.database.status -ne "ok") {
              throw "Database initialization check failed: $($status | ConvertTo-Json -Depth 5 -Compress)"
            }
            $database = Join-Path $dataDir "relationship_os.db"
            if (-not (Test-Path -LiteralPath $database)) {
              throw "Expected initialized SQLite database was not created at $database."
            }
          } finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - name: Check generated files and lock-file drift
        shell: pwsh
        run: |
          git diff --exit-code -- frontend/pubspec.lock frontend/windows/flutter
          git diff --exit-code

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: RelationshipOS-Windows-x64
          if-no-files-found: error
          retention-days: 14
          path: |
            dist/RelationshipOS-Windows-x64-*.zip
            dist/RelationshipOS-Setup-*.exe
            dist/RelationshipOS-Windows-x64-*-SHA256.txt
