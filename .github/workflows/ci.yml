name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests and schema
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      LLM_API_KEY: ""
      LLM_BASE_URL: ""
      LLM_FALLBACK_ENABLED: "false"
      OLLAMA_BASE_URL: http://127.0.0.1:9
      OLLAMA_TIMEOUT_SECONDS: "0.05"
      REDIS_URL: redis://127.0.0.1:9/0
      S3_ENDPOINT_URL: http://127.0.0.1:9
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-build.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --require-hashes --requirement backend/requirements-build.txt
          python -m pip check

      - name: Check Python lock-file drift
        run: |
          python -m piptools compile --generate-hashes --allow-unsafe --strip-extras --resolver=backtracking --output-file backend/requirements.txt backend/requirements.in
          python -m piptools compile --generate-hashes --allow-unsafe --strip-extras --resolver=backtracking --output-file backend/requirements-build.txt backend/requirements-build.in
          git diff --exit-code -- backend/requirements.txt backend/requirements-build.txt

      - name: Run all pytest tests
        working-directory: backend
        run: python -m pytest tests

      - name: Verify Alembic on an empty database and check schema drift
        working-directory: backend
        run: |
          export RELATIONSHIP_OS_DATA_DIR="$RUNNER_TEMP/alembic-data"
          export DATABASE_URL="sqlite:///$RUNNER_TEMP/alembic-empty.db"
          python - <<'PY'
          from pathlib import Path
          import os

          from alembic import command
          from alembic.config import Config
          from sqlalchemy import create_engine, inspect

          from app.db import Base
          from app.models import entities  # noqa: F401

          database_path = Path(os.environ["RUNNER_TEMP"]) / "alembic-empty.db"
          assert not database_path.exists(), f"database is not empty: {database_path}"

          config = Config()
          config.set_main_option("script_location", str(Path("migrations").resolve()))
          config.set_main_option("sqlalchemy.url", os.environ["DATABASE_URL"])
          command.upgrade(config, "head")
          command.check(config)

          engine = create_engine(os.environ["DATABASE_URL"])
          actual = set(inspect(engine).get_table_names()) - {"alembic_version"}
          expected = set(Base.metadata.tables)
          assert actual == expected, {
              "missing": sorted(expected - actual),
              "unexpected": sorted(actual - expected),
          }
          with engine.connect() as connection:
              revision = connection.exec_driver_sql(
                  "SELECT version_num FROM alembic_version"
              ).scalar_one()
          assert revision, "Alembic did not record a head revision"
          engine.dispose()
          PY

  flutter:
    name: Flutter analyze and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
      FLUTTER_SUPPRESS_ANALYTICS: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Flutter 3.44.1
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.1
          channel: stable
          cache: true

      - name: Resolve locked Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Check generated lock-file drift
        run: git diff --exit-code -- frontend/pubspec.lock

      - name: Analyze Flutter application
        working-directory: frontend
        run: flutter analyze --no-pub

      - name: Run Flutter tests
        working-directory: frontend
        run: flutter test --no-pub

      - name: Check repository drift
        run: git diff --exit-code
